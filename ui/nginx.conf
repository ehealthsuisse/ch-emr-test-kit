server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # SPA fallback: client-side router handles /ig/* routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin proxy to the FHIR server so the browser never makes a
    # cross-origin request (no CORS configuration needed on HAPI).
    #
    # Using a variable in proxy_pass forces nginx to resolve "fhir" at request
    # time via the container DNS resolver (written to resolver.conf at startup),
    # so the proxy keeps working if the fhir container restarts with a new IP.
    location /fhir/ {
        include /etc/nginx/resolver.conf;
        set $fhir_upstream fhir;
        proxy_pass http://$fhir_upstream:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
